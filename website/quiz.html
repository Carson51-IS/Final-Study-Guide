<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IS 414 Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">IS 414 Final Prep</a>
    <nav>
      <a href="index.html">Study Guide</a>
      <a href="quiz.html" class="active">Quiz</a>
      <button id="theme-toggle" title="Toggle theme">☀/☾</button>
    </nav>
  </header>

  <div class="container">
    <!-- SETUP -->
    <div id="quiz-setup" class="quiz-setup">
      <h2>Configure Your Quiz</h2>
      <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:1rem;">Select topics, choose how many questions, and start.</p>

      <div class="topic-checkboxes" id="topic-checks"></div>

      <div class="count-row">
        <label for="q-count">Questions:</label>
        <input type="number" id="q-count" min="1" value="20">
        <span class="max-label" id="max-label">/ 200 available</span>
      </div>

      <button class="btn btn-primary" id="start-btn">Start Quiz</button>
    </div>

    <!-- QUIZ AREA -->
    <div id="quiz-area" class="hidden">
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <div id="question-container"></div>
      <div class="quiz-nav">
        <button class="btn btn-secondary" id="prev-btn">← Previous</button>
        <button class="btn btn-primary" id="next-btn">Next →</button>
      </div>
    </div>

    <!-- RESULTS -->
    <div id="results-area" class="hidden"></div>
  </div>

  <script src="js/quiz-data.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
